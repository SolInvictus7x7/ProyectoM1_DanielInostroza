<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paletas Colorfly Studio</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <h1>Colorfly Studio</h1>
        <p> Generador de Paletas de Colores</p>
    </header>
    <div class="caja-interactiva">
        <input type="checkbox" class="tipo-color">hsl-rgba</input>
        <button class="boton-generar">Generar Paletas!</button>
    </div>
    <article>
            <div class="paleta">
                <div class="nombre-paleta">Paleta 1</div>
                <ul>
                    <li class="color">Color 1</li>
                    <li class="color">Color 2</li>
                    <li class="color">Color 3</li>
                    <li class="color">Color 4</li>
                    <li class="color">Color 5</li>
                    <li class="color">Color 6</li>
                    <li class="color">Color 7</li>
                    <li class="color">Color 8</li>
                    <li class="color">Color 9</li>
                </ul>
            </div>
    </article>
</body>
</html>
